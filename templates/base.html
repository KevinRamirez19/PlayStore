<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K-Means · Play Store Analytics</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #080810;
            --surface: #10101E;
            --card: #14142A;
            --border: #2A2A50;
            --accent1: #6C63FF;
            --accent2: #FF6584;
            --accent3: #43D9AD;
            --text: #E8E8F0;
            --muted: #888899;
            --c0: #6C63FF;
            --c1: #FF6584;
            --c2: #43D9AD;
            --c3: #FFB347;
            --c4: #4FC3F7;
            --c5: #F06292;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8, 8, 16, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 0;
        }

        .nav-brand {
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent1);
            padding: 1rem 1.5rem 1rem 0;
            border-right: 1px solid var(--border);
            margin-right: 1rem;
            text-decoration: none;
            letter-spacing: .05em;
            white-space: nowrap;
        }

        .nav-links {
            display: flex;
            gap: 0;
            flex-wrap: wrap;
        }

        .nav-links a {
            padding: .85rem 1rem;
            color: var(--muted);
            text-decoration: none;
            font-size: .8rem;
            letter-spacing: .04em;
            border-bottom: 2px solid transparent;
            transition: color .2s, border-color .2s;
            white-space: nowrap;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text);
            border-bottom-color: var(--accent1);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .hero {
            text-align: center;
            padding: 4rem 1rem 3rem;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(108, 99, 255, .15), transparent);
        }

        .hero-label {
            font-family: 'Space Mono', monospace;
            font-size: .75rem;
            letter-spacing: .2em;
            color: var(--accent3);
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 1rem;
        }

        .hero h1 span {
            color: var(--accent1);
        }

        .hero p {
            color: var(--muted);
            font-size: 1.05rem;
            max-width: 620px;
            margin: 0 auto 2rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1rem;
            padding-bottom: .75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: .6rem;
        }

        .card h2 .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent1);
            display: inline-block;
            flex-shrink: 0;
        }

        .card p,
        .card li {
            color: var(--muted);
            line-height: 1.75;
            margin-bottom: .5rem;
        }

        .card ul,
        .card ol {
            padding-left: 1.4rem;
            margin-bottom: .5rem;
        }

        .grid2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media(max-width:700px) {
            .grid2 {
                grid-template-columns: 1fr;
            }
        }

        .table-wrap {
            overflow-x: auto;
            max-height: 420px;
            overflow-y: auto;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .8rem;
        }

        thead th {
            background: #1A1A35;
            color: var(--accent1);
            padding: .6rem .9rem;
            text-align: left;
            font-family: 'Space Mono', monospace;
            font-size: .72rem;
            letter-spacing: .06em;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        tbody tr {
            border-top: 1px solid var(--border);
        }

        tbody tr:hover {
            background: rgba(108, 99, 255, .07);
        }

        tbody td {
            padding: .5rem .9rem;
            color: var(--muted);
        }

        .badge {
            display: inline-block;
            padding: .15rem .55rem;
            border-radius: 20px;
            font-size: .72rem;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
        }

        .chart-img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .form-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .form-row label {
            color: var(--muted);
            font-size: .9rem;
        }

        .form-row input[type=number] {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: .5rem .8rem;
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            width: 80px;
            font-size: 1rem;
        }

        .btn {
            background: var(--accent1);
            color: white;
            border: none;
            padding: .55rem 1.4rem;
            border-radius: 8px;
            font-family: 'Sora', sans-serif;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s;
        }

        .btn:hover {
            opacity: .85;
        }

        .cluster-cards {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .cl-card {
            flex: 1;
            min-width: 160px;
            padding: 1rem 1.2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
        }

        .cl-card .cl-num {
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .cl-card .cl-label {
            color: var(--muted);
            font-size: .8rem;
            margin-top: .2rem;
        }


        strong {
            color: var(--text);
        }

        code {
            font-family: 'Space Mono', monospace;
            background: rgba(108, 99, 255, .15);
            padding: .1em .4em;
            border-radius: 4px;
            font-size: .85em;
            color: var(--accent3);
        }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: .8rem;
            margin-top: 2rem;
        }
    </style>
</head>

<body>

    <nav>
        <a class="nav-brand" href="/">⬡ K-MEANS</a>
        <div class="nav-links">
            <a href="/" {% if request.path=='/' %}class="active" {% endif %}>Inicio</a>
            <a href="/descripcion/" {% if request.path=='/descripcion/' %}class="active" {% endif %}>Descripción</a>
            <a href="/dataset/" {% if request.path=='/dataset/' %}class="active" {% endif %}>Dataset</a>
            <a href="/conceptos/" {% if request.path=='/conceptos/' %}class="active" {% endif %}>Conceptos</a>
            <a href="/modelo/" {% if request.path=='/modelo/' %}class="active" {% endif %}>Modelo</a>
            <a href="/interpretacion/" {% if request.path=='/interpretacion/' %}class="active" {% endif
                %}>Interpretación</a>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer>Play Store K-Means Analytics · Clustering con Python &amp; Flask</footer>
</body>

</html>
